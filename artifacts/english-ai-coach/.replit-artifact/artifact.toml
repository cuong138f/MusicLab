kind = "web"
previewPath = "/english-ai-coach/"
title = "English AI Coach"
version = "1.0.0"
id = "artifacts/english-ai-coach"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/english-ai-coach/" ]
localPort = 18391

[services.development]
run = "pnpm --filter @workspace/english-ai-coach run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/english-ai-coach", "run", "build" ]
publicDir = "artifacts/english-ai-coach/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18391"
BASE_PATH = "/english-ai-coach/"
